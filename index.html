<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPhone 13 Web Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
        }

        .simulator {
            width: 390px;
            height: 844px;
            max-width: 100vw;
            max-height: 100vh;
            position: relative;
            overflow: hidden;
            background-image: url('https://i.postimg.cc/D0TSW9NZ/IMG-8896.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 40px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .dock {
            position: absolute;
            bottom: 20px; 
            left: 12px;
            right: 12px;
            height: 90px;
            border-radius: 30px;
            background-color: rgba(255, 255, 255, 0.25);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
        }
    </style>
</head>
<body>
    <div class="simulator">
        <div class="dock"></div>
    </div>
</body>
</html>
