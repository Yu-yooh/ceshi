<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ᗜ - ᗜ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111; 
            overflow: hidden;
        }

        .simulator {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 390px; 
            max-height: 844px;
            background-image: url('https://i.postimg.cc/D0TSW9NZ/IMG-8896.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        @media (min-width: 400px) {
            .simulator {
                border-radius: 40px;
                box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
                border: 6px solid #222; 
            }
        }

        .dock {
            position: absolute;
            bottom: 20px; 
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px); 
            height: 90px; 
            border-radius: 32px; 
            background: rgba(255, 255, 255, 0.25); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 12px;
        }

        .dock-app {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 14px;
        }
    </style>
</head>
<body>

    <div class="simulator">
        <div class="dock">
            <div class="dock-app"></div>
            <div class="dock-app"></div>
            <div class="dock-app"></div>
            <div class="dock-app"></div>
        </div>
    </div>

</body>
</html>
